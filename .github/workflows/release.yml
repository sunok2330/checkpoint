name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ### Claude Code
            ```bash
            claude install-skill Jyo238/checkpoint
            ```

            ### Cursor
            Copy `cursor/rules/checkpoint.mdc` to your project's `.cursor/rules/` directory.

            ### VSCode Copilot
            Copy files from `vscode/` to your `.github/` directory.

            See [README](https://github.com/Jyo238/checkpoint#installation) for full instructions.
